name: Daily World Cup Brief

on:
  workflow_dispatch:
  schedule:
    # 09:15 China Standard Time.
    - cron: '15 1 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh public data
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: pnpm update:data

      - name: Build
        run: pnpm build

      - name: Commit updated brief
        run: |
          git config user.name "worldcup-brief-bot"
          git config user.email "worldcup-brief-bot@users.noreply.github.com"
          git add public/data/worldcup-brief.json
          git diff --cached --quiet || git commit -m "chore: update world cup brief"
          git push
